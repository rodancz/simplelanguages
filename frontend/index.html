<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="description" content="The most lightweight programming language executor">
    <title>simplelanguages.com</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x26a1;</text></svg>">
</head>
<body>
    <nav id="topbar">
        <button id="fav-btn" title="Favorites">★</button>
        <select id="language-select"></select>
        <button id="run-btn" title="Run (Ctrl+Enter)">▶ Run</button>
        <div class="spacer"></div>
        <button id="settings-btn" title="Settings">⚙</button>
        <button id="plugin-btn" title="Plugins">Plugins</button>
    </nav>
    <div id="tabbar" class="hidden"></div>
    <div id="stdin-panel" class="hidden">
        <input id="stdin-input" placeholder="stdin (optional)…">
    </div>
    <main>
        <div id="editor"></div>
        <div id="web-preview" class="hidden"><button id="web-preview-close" title="Close preview">&times;</button></div>
        <div id="output">
            <div id="output-toolbar">
                <span id="exec-time"></span>
                <span class="dot" id="save-dot" title="Auto-saved">●</span>
                <button id="clear-output" title="Clear output">Clear</button>
                <button id="copy-output" title="Copy output to clipboard">Copy</button>
            </div>
            <div id="output-content"></div>
        </div>
    </main>
    <div id="statusbar">
        <span id="status-lang"></span>
        <span id="status-cursor"></span>
        <span id="status-indent"></span>
        <span id="status-preprocessor"></span>
    </div>
    <aside id="plugin-panel" class="closed">
        <div class="panel-header">
            <span>Plugins</span>
            <input id="plugin-search" placeholder="Filter…">
            <button id="btn-create-plugin" class="btn-create" title="Create Plugin">+ New</button>
            <button id="btn-admin" class="btn-admin" title="Admin / Moderate">Admin</button>
            <button id="plugin-close">&times;</button>
        </div>
        <div class="panel-body" id="plugin-list"></div>
    </aside>
    <div id="settings-panel" class="closed">
        <div class="panel-header"><span>Settings</span><button id="settings-close">&times;</button></div>
        <div class="panel-body">
            <label class="setting"><span>Word Wrap</span><input type="checkbox" id="set-wrap"></label>
            <label class="setting"><span>Font Size</span><input type="number" id="set-fontsize" min="10" max="24" value="14"></label>
            <label class="setting"><span>Indent</span><select id="set-indent"><option value="2">2 spaces</option><option value="4" selected>4 spaces</option><option value="8">8 spaces</option><option value="\t">Tabs</option></select></label>
            <label class="setting"><span>Keymap</span><select id="set-keymap"><option value="default" selected>Default</option></select></label>
        </div>
    </div>
    <button id="mobile-run" class="hidden" title="Run">▶</button>
    <div id="keyboard-bar" class="hidden">
        <button data-key="Tab">⇥</button>
        <button data-key="(">(</button>
        <button data-key=")">)</button>
        <button data-key="{">{</button>
        <button data-key="}">}</button>
        <button data-key="[">[</button>
        <button data-key="]">]</button>
        <button data-key='"'>&#34;</button>
        <button data-key="'">&#39;</button>
        <button data-key="=">=</button>
        <button data-key=";">;</button>
        <button class="kb-close" title="Hide keyboard">✕</button>
    </div>
    <div id="help-overlay" class="hidden">
        <div class="help-content">
            <h3>Shortcuts</h3>
            <div><kbd>Ctrl+Enter</kbd> Run code</div>
            <div><kbd>Ctrl+F</kbd> Find / Zen toggle</div>
            <div><kbd>Ctrl+Shift+L</kbd> Focus language</div>
            <div><kbd>Ctrl+Shift+S</kbd> Share URL</div>
            <div><kbd>Ctrl+,</kbd> Focus stdin</div>
            <div><kbd>Esc</kbd> Close panels</div>
            <div><kbd>?</kbd> This help</div>
        </div>
    </div>
    <div id="share-toast">Link copied!</div>
    <div id="plugin-create-overlay" class="hidden">
        <form class="plugin-create-form" id="plugin-create-form">
            <h3>Create Plugin</h3>
            <label>Name</label>
            <input type="text" id="pcf-name" placeholder="My Plugin" required maxlength="60">
            <label>Description</label>
            <textarea id="pcf-desc" placeholder="What does it do?" required maxlength="200"></textarea>
            <label>Category</label>
            <select id="pcf-cat" required>
                <option value="">-- select --</option>
                <option value="language">Language</option>
                <option value="theme">Theme</option>
                <option value="engine">Engine</option>
                <option value="ai">AI Assistant</option>
            </select>
            <label>Version</label>
            <input type="text" id="pcf-ver" placeholder="1.0.0" maxlength="20">
            <div id="pcf-lang-fields" class="hidden">
                <label>Template Code</label>
                <textarea id="pcf-tpl" placeholder='print("Hello, World!")'></textarea>
                <label>Source Filename</label>
                <input type="text" id="pcf-filename" placeholder="main.py">
                <label>Compile Command (optional)</label>
                <input type="text" id="pcf-compile" placeholder="gcc {file} -o {dir}/main">
                <label>Run Command</label>
                <input type="text" id="pcf-run" placeholder="python3 {file}" value="" required>
            </div>
            <div id="pcf-theme-fields" class="hidden">
                <label>CSS Class Name</label>
                <input type="text" id="pcf-css" placeholder="my-theme" maxlength="30">
            </div>
            <div id="pcf-engine-fields" class="hidden">
                <label>Engine Description</label>
                <textarea id="pcf-engine-desc" placeholder="Explain what this engine does..."></textarea>
            </div>
            <div id="pcf-ai-fields" class="hidden">
                <label>AI Provider Info</label>
                <textarea id="pcf-ai-desc" placeholder="Describe the AI provider / capabilities..."></textarea>
            </div>
            <div id="pcf-error" class="form-error hidden"></div>
            <div id="pcf-success" class="form-success hidden">Plugin submitted for review!</div>
            <div class="form-buttons">
                <button type="button" class="btn-cancel" id="pcf-cancel">Cancel</button>
                <button type="submit" class="btn-submit">Submit for Review</button>
            </div>
        </form>
    </div>
    <div id="admin-overlay" class="hidden">
        <div class="plugin-create-form" id="admin-panel" style="width:440px">
            <h3>Admin — Plugin Moderation</h3>
            <label>API Key</label>
            <div style="display:flex;gap:6px;margin-bottom:10px">
                <input type="password" id="admin-key" placeholder="Enter owner API key…" style="flex:1;margin-bottom:0">
                <button id="admin-login-btn" class="btn-submit" style="margin-bottom:0">Unlock</button>
            </div>
            <div id="admin-error" class="form-error hidden"></div>
            <div id="admin-list" class="hidden">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                    <span style="font-size:11px;color:var(--text-dim)"><span id="admin-count">0</span> pending</span>
                    <button id="admin-refresh" class="btn-admin" style="font-size:10px;padding:2px 8px">Refresh</button>
                </div>
                <div id="admin-pending-list" style="max-height:50vh;overflow-y:auto"></div>
            </div>
            <div class="form-buttons">
                <button type="button" class="btn-cancel" id="admin-close">Close</button>
            </div>
        </div>
    </div>
    <script type="module" src="js/bundle.js"></script>
</body>
</html>
